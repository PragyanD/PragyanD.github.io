<svg width="72" height="72" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="flappyBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a6fb5"/>
      <stop offset="100%" stop-color="#0d4a80"/>
    </linearGradient>
    <linearGradient id="flappyShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="55%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <clipPath id="flappyClip"><rect width="72" height="72" rx="16" ry="16"/></clipPath>
  </defs>
  <rect width="72" height="72" rx="16" fill="url(#flappyBg)"/>
  <!-- Ground -->
  <rect x="0" y="58" width="72" height="14" rx="0" fill="#5c8a2c" clip-path="url(#flappyClip)"/>
  <rect x="0" y="55" width="72" height="6" fill="#7ab832" clip-path="url(#flappyClip)"/>
  <!-- Pipe top -->
  <rect x="48" y="0"  width="14" height="28" fill="#5c8a2c" rx="2"/>
  <rect x="46" y="24" width="18" height="5"  fill="#7ab832" rx="2"/>
  <!-- Pipe bottom -->
  <rect x="48" y="40" width="14" height="16" fill="#5c8a2c" rx="2" clip-path="url(#flappyClip)"/>
  <rect x="46" y="38" width="18" height="5"  fill="#7ab832" rx="2"/>
  <!-- Bird body -->
  <circle cx="28" cy="34" r="9" fill="#f5c518"/>
  <!-- Wing -->
  <ellipse cx="26" cy="38" rx="6" ry="3.5" fill="#e6a800" transform="rotate(-15 26 38)"/>
  <!-- Eye -->
  <circle cx="31" cy="31" r="3" fill="white"/>
  <circle cx="32" cy="31" r="1.8" fill="#111"/>
  <circle cx="32.5" cy="30.5" r="0.5" fill="white"/>
  <!-- Beak -->
  <path d="M33 34 L39 33 L33 36 Z" fill="#e55b2b"/>
  <!-- Neural network dots (top left, subtle) -->
  <circle cx="10" cy="10" r="1.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="18" cy="8"  r="1.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="10" cy="18" r="1.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="18" cy="18" r="1.5" fill="rgba(255,255,255,0.5)"/>
  <line x1="10" y1="10" x2="18" y2="8"  stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
  <line x1="10" y1="10" x2="18" y2="18" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
  <line x1="10" y1="18" x2="18" y2="8"  stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
  <line x1="10" y1="18" x2="18" y2="18" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
  <rect width="72" height="36" rx="16" fill="url(#flappyShine)" clip-path="url(#flappyClip)"/>
  <rect width="72" height="72" rx="16" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
</svg>
