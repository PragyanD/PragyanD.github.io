<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="#1a1a2e"/>
  <!-- Monitor frame -->
  <rect x="16" y="20" width="96" height="68" rx="8" fill="#0f0f1a" stroke="#10b981" stroke-width="2"/>
  <!-- Screen content — heartbeat line -->
  <polyline points="24,58 36,58 42,40 48,72 54,48 60,62 66,54 72,58 84,58 90,38 96,70 102,50" stroke="#10b981" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Scan line glow -->
  <rect x="18" y="50" width="92" height="2" rx="1" fill="#10b981" opacity="0.15"/>
  <!-- Monitor stand -->
  <rect x="52" y="88" width="24" height="8" rx="2" fill="#10b981" opacity="0.6"/>
  <rect x="40" y="96" width="48" height="6" rx="3" fill="#10b981" opacity="0.4"/>
  <!-- Small dots — data points -->
  <circle cx="30" cy="30" r="2" fill="#34d399" opacity="0.8"/>
  <circle cx="40" cy="34" r="1.5" fill="#6ee7b7" opacity="0.6"/>
  <circle cx="80" cy="28" r="2" fill="#34d399" opacity="0.7"/>
  <circle cx="98" cy="32" r="1.5" fill="#6ee7b7" opacity="0.5"/>
  <!-- Corner accent -->
  <rect x="16" y="20" width="96" height="68" rx="8" fill="none" stroke="#10b981" stroke-width="1" opacity="0.3"/>
</svg>
