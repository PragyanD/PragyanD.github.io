<svg width="72" height="72" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="mineBg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#2D5A1B"></stop>
              <stop offset="100%" stop-color="#0F2008"></stop>
            </linearGradient>
            <linearGradient id="mineShine" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="rgba(255,255,255,0.35)"></stop>
              <stop offset="55%" stop-color="rgba(255,255,255,0)"></stop>
            </linearGradient>
            <radialGradient id="bombGrad" cx="35%" cy="30%" r="65%">
              <stop offset="0%" stop-color="#666"></stop>
              <stop offset="100%" stop-color="#111"></stop>
            </radialGradient>
            <clipPath id="mineClip"><rect width="72" height="72" rx="16" ry="16"></rect></clipPath>
          </defs>
          <rect width="72" height="72" rx="16" fill="url(#mineBg)"></rect>

          <!-- Grid cells background -->
          <rect x="8" y="8" width="14" height="14" rx="2" fill="rgba(255,255,255,0.08)"></rect>
          <rect x="24" y="8" width="14" height="14" rx="2" fill="rgba(255,255,255,0.05)"></rect>
          <rect x="40" y="8" width="14" height="14" rx="2" fill="rgba(255,255,255,0.08)"></rect>
          <rect x="56" y="8" width="8" height="14" rx="2" fill="rgba(255,255,255,0.05)"></rect>
          <rect x="8" y="24" width="14" height="14" rx="2" fill="rgba(255,255,255,0.05)"></rect>
          <rect x="56" y="24" width="8" height="14" rx="2" fill="rgba(255,255,255,0.08)"></rect>
          <rect x="8" y="50" width="14" height="14" rx="2" fill="rgba(255,255,255,0.08)"></rect>
          <rect x="56" y="50" width="8" height="14" rx="2" fill="rgba(255,255,255,0.05)"></rect>

          <!-- Number hints on safe cells -->
          <text x="15" y="19" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="8" font-weight="900" fill="#4488FF">1</text>
          <text x="31" y="19" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="8" font-weight="900" fill="#2ECC71">2</text>
          <text x="47" y="19" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="8" font-weight="900" fill="#4488FF">1</text>
          <text x="15" y="35" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="8" font-weight="900" fill="#E74C3C">3</text>

          <!-- Bomb body -->
          <circle cx="38" cy="42" r="14" fill="url(#bombGrad)"></circle>
          <!-- Bomb shine -->
          <ellipse cx="33" cy="36" rx="5" ry="3.5" fill="rgba(255,255,255,0.25)" transform="rotate(-30 33 36)"></ellipse>
          <!-- Bomb fuse -->
          <path d="M38 28 Q42 22 46 20" stroke="#A07020" stroke-width="2.5" fill="none" stroke-linecap="round"></path>
          <!-- Fuse spark -->
          <circle cx="47" cy="19" r="3" fill="#FF8C00"></circle>
          <circle cx="47" cy="19" r="1.5" fill="#FFE000"></circle>
          <!-- Bomb spikes -->
          <line x1="24" y1="42" x2="20" y2="42" stroke="#222" stroke-width="3" stroke-linecap="round"></line>
          <line x1="52" y1="42" x2="56" y2="42" stroke="#222" stroke-width="3" stroke-linecap="round"></line>
          <line x1="38" y1="28" x2="38" y2="24" stroke="#222" stroke-width="3" stroke-linecap="round"></line>
          <line x1="38" y1="56" x2="38" y2="60" stroke="#222" stroke-width="3" stroke-linecap="round"></line>
          <line x1="28" y1="32" x2="25" y2="29" stroke="#222" stroke-width="2.5" stroke-linecap="round"></line>
          <line x1="48" y1="32" x2="51" y2="29" stroke="#222" stroke-width="2.5" stroke-linecap="round"></line>
          <line x1="28" y1="52" x2="25" y2="55" stroke="#222" stroke-width="2.5" stroke-linecap="round"></line>
          <line x1="48" y1="52" x2="51" y2="55" stroke="#222" stroke-width="2.5" stroke-linecap="round"></line>

          <!-- Flag on one of the cells -->
          <rect x="57" y="26" width="6" height="11" rx="1" fill="rgba(255,255,255,0.1)"></rect>
          <line x1="59" y1="27" x2="59" y2="36" stroke="#E74C3C" stroke-width="1.5"></line>
          <polygon points="59,27 63,29 59,31" fill="#E74C3C"></polygon>

          <rect width="72" height="36" rx="16" fill="url(#mineShine)" clip-path="url(#mineClip)"></rect>
          <rect width="72" height="72" rx="16" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"></rect>
        </svg>