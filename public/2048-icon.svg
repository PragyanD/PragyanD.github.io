<svg width="72" height="72" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="k2048Bg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#BBADA0"></stop>
              <stop offset="100%" stop-color="#8A7060"></stop>
            </linearGradient>
            <linearGradient id="k2048Shine" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="rgba(255,255,255,0.45)"></stop>
              <stop offset="55%" stop-color="rgba(255,255,255,0)"></stop>
            </linearGradient>
            <clipPath id="k2048Clip"><rect width="72" height="72" rx="16" ry="16"></rect></clipPath>
          </defs>
          <rect width="72" height="72" rx="16" fill="url(#k2048Bg)"></rect>

          <!-- Board grid background -->
          <rect x="7" y="7" width="58" height="58" rx="6" fill="#BBADA0"></rect>

          <!-- 4 tile cells -->
          <!-- Top left: 2 tile -->
          <rect x="10" y="10" width="24" height="24" rx="3" fill="#EEE4DA"></rect>
          <text x="22" y="27" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="#776E65">2</text>

          <!-- Top right: 4 tile -->
          <rect x="38" y="10" width="24" height="24" rx="3" fill="#EDE0C8"></rect>
          <text x="50" y="27" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="#776E65">4</text>

          <!-- Bottom left: 16 tile (orange) -->
          <rect x="10" y="38" width="24" height="24" rx="3" fill="#F59563"></rect>
          <text x="22" y="55" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="11" font-weight="900" fill="white">16</text>

          <!-- Bottom right: 2048 tile (glowing gold — the hero) -->
          <rect x="38" y="38" width="24" height="24" rx="3" fill="#EDC22E"></rect>
          <!-- Glow effect -->
          <rect x="38" y="38" width="24" height="24" rx="3" fill="none" stroke="#F5D060" stroke-width="2" opacity="0.8"></rect>
          <text x="50" y="54" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="8.5" font-weight="900" fill="white">2048</text>

          <rect width="72" height="36" rx="16" fill="url(#k2048Shine)" clip-path="url(#k2048Clip)"></rect>
          <rect width="72" height="72" rx="16" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"></rect>
        </svg>